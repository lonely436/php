				<!-- Brand and toggle get grouped for better mobile display -->

						data-target="#bs-example-navbar-collapse-1" aria-expanded="false">

				<!-- Collect the nav links, forms, and other content for toggling -->

						<li><img class="logo" src="images/mylogo.png" alt=""></li>
						<li><a href="#"> <span class="sr-only">(current)</span></a></li>
						<li><a href="index.html">首页</a></li>
						<li class="dropdown">
							<a href="#" class="dropdown-toggle" data-toggle="dropdown" role="button"
								aria-haspopup="true" aria-expanded="false">名企管理 <span class="caret"></span></a>
							<ul class="dropdown-menu">
								<li><a href="add.html">添加企业</a></li>

		<!-- 页面主体内容 -->
		<div class="container-fluid">
			<div class="row" class="text-left">
				<div class="col-md-3"></div>
				<div class="col-md-6">
					<center>
						<h3>添加企业信息</h3>
					</center>
					<form action="#" method="post">
						<div class="form-group">
							<label>名 称</label>
							<input type="text" name="name" class="form-control" placeholder="企业名称">
						</div>
						<div class="form-group">
							<label>简 称</label>
							<input type="text" name="abbreviate" class="form-control" placeholder="企业简称">
						</div>
						<div class="form-group">
							<label>理 念</label>
							<input type="text" name="philosophy" class="form-control" placeholder="企业理念">
						</div>
						<div class="form-group">
							<label for="exampleInputFile">图 片</label>
							<input type="file" name="image" id="exampleInputFile">
						</div>
						<div class="form-group">
							<label for="exampleInputFile">描 述</label>
							<textarea name="discription" class="form-control" rows="3" placeholder="企业描述"></textarea>
						</div>
						<button type="submit" class="btn btn-info">提交</button>
					</form>
				</div>
				<div class="col-md-3"></div>
			</div>
		</div>
