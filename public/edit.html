	<body>

							<ul class="dropdown-menu">

								<li><a href="index.html">管理企业</a></li>

					</ul>
					<ul class="nav navbar-nav navbar-right">
						<li><a href="#">欢迎您：admin</a></li>

				</div><!-- /.navbar-collapse -->

		</nav>

		<!-- 页面主体内容 -->
		<div class="container-fluid">
			<div class="row" class="text-left">
				<div class="col-md-3"></div>
				<div class="col-md-6">
					<center>
						<h3>编辑企业信息</h3>
					</center>

					<form action="#" method="post">
						<div class="form-group">
							<label>名 称</label>
							<input type="text" name="name" value="华为技术有限公司" class="form-control">
						</div>
						<div class="form-group">
							<label>简 称</label>
							<input type="text" name="abbreviate" value="华为" class="form-control">
						</div>
						<div class="form-group">
							<label>理 念</label>
							<input type="text" name="philosophy" value="聚焦客户需求，持续创新" class="form-control">
						</div>
						<div class="row" class="text-left">
							<div class="col-md-4">
								<div class="form-group form-inline">
									<label for="exampleInputFile">照 片</label>
									<input type="file" name="image" id="exampleInputFile">
								</div>
							</div>
							<div class="col-md-8">
								<span><img class="img-thumbnail" src="images/腾讯.jpg" width="60px" alt="头像" /></span>

							</div>
						</div>
						<div class="form-group">
							<label for="exampleInputFile">描 述</label>
							<textarea name="description" class="form-control"
								rows="3">华为技术有限公司，成立于1987年，总部位于广东省深圳市龙岗区。2021年，华为公司的总收入为6368亿元，净利润达到1137亿元。华为是全球领先的信息与通信技术（ICT）解决方案供应商，专注于ICT领域，坚持稳健经营、持续创新、开放合作，在电信运营商、企业、终端和云计算等领域构筑了端到端的解决方案优势，为运营商客户、企业客户和消费者提供有竞争力的ICT解决方案、产品和服务，并致力于实现未来信息社会、构建更美好的全联接世界。</textarea>
						</div>
						<button type="submit" class="btn btn-info">提交</button>
					</form>
				</div>
				<div class="col-md-3"></div>
			</div>
		</div>
